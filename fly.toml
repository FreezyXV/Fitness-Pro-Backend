app = "fitness-pro"
primary_region = "ord"

[build]
  buildpacks = ["heroku/php"]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  CACHE_DRIVER = "database"
  SESSION_DRIVER = "database"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[deploy]
  release_command = "php artisan migrate --force"