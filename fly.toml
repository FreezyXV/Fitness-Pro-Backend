app = "fitness-pro"
primary_region = "ord"

[build]
  buildpacks = ["heroku/php"]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  CACHE_DRIVER = "database"
  SESSION_DRIVER = "database"
  QUEUE_CONNECTION = "sync"
  # Forcer l'utilisation du port 8080 pour Apache
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[deploy]
  release_command = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force"

[mounts]
  source = "storage_volume"
  destination = "/app/storage"