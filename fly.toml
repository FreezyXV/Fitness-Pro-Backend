# App configuration
app = "fitness-pro"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = "5s"

# Build configuration
[build]
  dockerfile = "Dockerfile"

# Environment variables (non-sensitive)
[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_TIMEZONE = "UTC"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  
  # Cache and session
  CACHE_DRIVER = "database"
  FILESYSTEM_DISK = "local"
  QUEUE_CONNECTION = "sync"
  SESSION_DRIVER = "database"
  SESSION_LIFETIME = "120"
  SESSION_SECURE_COOKIE = "true"
  
  # Security settings
  BCRYPT_ROUNDS = "12"
  HASH_VERIFY = "true"
  
  # Image processing
  IMAGE_DRIVER = "gd"
  IMAGE_QUALITY = "85"
  IMAGE_MAX_WIDTH = "1920"
  IMAGE_MAX_HEIGHT = "1920"
  
  # File upload limits
  UPLOAD_MAX_FILESIZE = "10M"
  POST_MAX_SIZE = "10M"
  
  # Rate limiting
  RATE_LIMIT_LOGIN = "5"
  RATE_LIMIT_REGISTER = "3"
  RATE_LIMIT_API = "60"
  
  # Features
  ANALYTICS_ENABLED = "false"
  MONITORING_ENABLED = "false"
  
  # Sanctum
  SANCTUM_EXPIRATION = "1440"
  SANCTUM_TOKEN_PREFIX = ""

# HTTP service configuration
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Services configuration
[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["app"]

  # Concurrency settings
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  # Port configuration
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health checks
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    tls_skip_verify = false
    headers = {}

# Deployment configuration
[deploy]
  release_command = "php artisan migrate --force"
  strategy = "rolling"

# Volume mounts for persistent storage
[[mounts]]
  source = "fitness_pro_storage"
  destination = "/var/www/storage"
  initial_size = "1gb"

# Machine configuration
[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Metrics configuration
[metrics]
  port = 8000
  path = "/api/health"

# Process configuration
[processes]
  app = "php artisan serve --host=0.0.0.0 --port=8000 --env=production"

