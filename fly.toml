app = "fitness-pro-backend"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NODE_VERSION = "18"
    PHP_VERSION = "8.2"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_NAME = "FitnessPro"
  APP_KEY = "base64:zxAlMGWMB/PxVDEsHkZCbGyV2XxZ48VKazys5jtFvfI="
  APP_URL = "https://fitness-pro-backend.fly.dev"
  APP_FORCE_HTTPS = "true"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  CACHE_DRIVER = "redis"
  SESSION_DRIVER = "redis"
  QUEUE_CONNECTION = "redis"
  FILESYSTEM_DISK = "local"
  
  # Database
  DB_CONNECTION = "pgsql"
  DB_HOST = "fitness-pro-db.internal"
  DB_PORT = "5432"
  DB_DATABASE = "fitness_pro"
  DB_USERNAME = "postgres"
  DB_PASSWORD = "5203"
  
  # Redis
  REDIS_HOST = "fitness-pro-redis.internal"
  REDIS_PORT = "6379"
  
  # Sanctum
  SANCTUM_STATEFUL_DOMAINS = "fitness-pro-frontend.vercel.app"
  
  # CORS
  CORS_ALLOWED_ORIGINS = "https://fitness-pro-frontend.vercel.app"
  CORS_SUPPORTS_CREDENTIALS = "true"

  # Frontend
  FRONTEND_URL = "https://fitness-pro-frontend.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[deploy]
  release_command = "php artisan storage:link && php artisan config:cache && php artisan migrate --force"

[mounts]
  source = "storage_volume"
  destination = "/var/www/html/storage"